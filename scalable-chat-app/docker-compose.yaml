services:
  redis:
    image: redis:latest
    container_name: chat-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  nginx:
    image: nginx:latest
    container_name: chat-nginx
    ports:
      - "8080:8080"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    restart: unless-stopped
    depends_on:
      - redis

  mongo:
    image: mongo:latest
    container_name: chat-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

volumes:
  mongo_data:
    driver: local
